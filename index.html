<style>
  :root{
    --ink:#1a1410;
    --paper:#f4ece0;
    --paper2:#ece0cf;
    --rust:#b5451a;
    --rust-dk:#8a3413;
    --gold:#c9962e;
    --green:#4a5d3a;
    --line:#d8c7ad;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.65;
    overflow-x:hidden;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;min-height:90vh;display:flex;align-items:flex-end;
    background:linear-gradient(to bottom,#2a1d3d 0%,#5a2a36 45%,#8a3413 100%);
    color:#fff;overflow:hidden;
  }
  .hero .sky{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.85}
  .hero .veil{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,12,28,.15),rgba(20,12,28,.72));z-index:1}
  .hero-inner{padding:0 24px 76px;max-width:1080px;margin:0 auto;width:100%;position:relative;z-index:2}
  .kicker{
    font-family:Georgia,serif;letter-spacing:.42em;text-transform:uppercase;
    font-size:.72rem;color:var(--gold);margin-bottom:18px;font-weight:bold;
  }
  .hero h1{
    font-size:clamp(3rem,9vw,6.4rem);line-height:.92;font-weight:normal;
    letter-spacing:-.02em;text-shadow:0 3px 30px rgba(0,0,0,.55);
  }
  .hero h1 em{color:var(--gold);font-style:italic}
  .hero p{font-size:1.15rem;max-width:560px;margin-top:22px;opacity:.94;text-shadow:0 1px 12px rgba(0,0,0,.5)}
  .scroll-hint{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;opacity:.7;z-index:2;
    animation:bob 2s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}

  /* ---------- EMERGENCY / CONTACT BAND ---------- */
  .contact{
    background:var(--rust-dk);color:#fff;text-align:center;padding:18px 24px;
    border-bottom:3px solid var(--gold);
  }
  .contact .lead{color:#ffe1ad;letter-spacing:.03em}
  .contact a{color:#fff;font-weight:bold;text-decoration:none;border-bottom:1px dotted #ffd58a}
  .contact .small{display:block;font-size:.82rem;opacity:.85;margin-top:4px;font-style:italic}

  /* ---------- NAV ---------- */
  nav{
    position:sticky;top:0;z-index:50;background:var(--paper);
    border-bottom:2px solid var(--ink);
  }
  nav .wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:12px 24px}
  nav .brand{font-weight:bold;letter-spacing:.1em;margin-right:auto;font-size:1.05rem}
  nav a{
    color:var(--ink);text-decoration:none;font-size:.8rem;
    letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;
    border-radius:2px;transition:.2s;
  }
  nav a:hover{background:var(--rust);color:#fff}
  .lang{display:flex;border:1px solid var(--ink);border-radius:99px;overflow:hidden;margin-left:10px}
  .lang button{
    font-family:Georgia,serif;font-size:.72rem;letter-spacing:.12em;font-weight:bold;
    padding:6px 13px;border:none;background:transparent;color:var(--ink);cursor:pointer;transition:.2s;
  }
  .lang button.active{background:var(--rust);color:#fff}

  /* ---------- SECTIONS ---------- */
  section{padding:80px 0;border-bottom:1px solid var(--line)}
  section:nth-of-type(even){background:var(--paper2)}
  .sec-head{margin-bottom:44px;position:relative}
  .sec-num{
    font-size:5rem;color:var(--line);font-style:italic;line-height:.7;
    display:block;margin-bottom:-8px;
  }
  .sec-head h2{
    font-size:clamp(2rem,5vw,3.2rem);font-weight:normal;letter-spacing:-.01em;
  }
  .sec-head .lead{margin-top:14px;max-width:640px;font-size:1.08rem;opacity:.85}
  .accent{height:3px;width:64px;background:var(--rust);margin-top:20px}

  /* ---------- CARDS ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px}
  .card{
    background:var(--paper);border:1px solid var(--line);
    border-radius:6px;overflow:hidden;transition:.25s;position:relative;
    box-shadow:0 1px 0 rgba(0,0,0,.04);display:flex;flex-direction:column;
  }
  section:nth-of-type(even) .card{background:#fff}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(138,52,19,.16);border-color:var(--rust)}
  .card .photo{
    height:178px;width:100%;object-fit:cover;display:block;
    background:linear-gradient(135deg,#5a2a36,#8a3413);
  }
  .card .body{padding:22px 24px 24px}
  .card h3{font-size:1.3rem;margin-bottom:8px;color:var(--rust-dk);line-height:1.2}
  .card p{font-size:.97rem;opacity:.9}
  .card .info{
    margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
    font-size:.83rem;letter-spacing:.02em;color:var(--green);font-style:italic;
  }
  .card .tag{
    display:inline-block;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;
    background:var(--gold);color:var(--ink);padding:3px 9px;border-radius:99px;
    margin-bottom:12px;font-family:Georgia,serif;
  }
  .links{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
  .links a{
    font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;
    color:var(--rust-dk);border:1px solid var(--line);padding:5px 11px;border-radius:99px;transition:.2s;
  }
  .links a:hover{background:var(--rust);color:#fff;border-color:var(--rust)}

  /* ---------- ITINERARY ---------- */
  .days{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
  .day{background:#fff;border:1px solid var(--line);border-radius:6px;padding:26px;border-top:5px solid var(--rust)}
  .day h3{font-size:1.4rem;color:var(--rust-dk);margin-bottom:4px;font-weight:normal}
  .day .sub{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--green);margin-bottom:16px}
  .day ul{list-style:none}
  .day li{padding:9px 0 9px 22px;position:relative;font-size:.96rem;border-bottom:1px dashed var(--line)}
  .day li:last-child{border-bottom:none}
  .day li::before{content:"›";position:absolute;left:0;color:var(--rust);font-weight:bold}
  .day li b{color:var(--ink)}

  /* ---------- MAP ---------- */
  .map-box{height:560px;width:100%;border:1px solid var(--line);border-radius:6px;box-shadow:0 1px 0 rgba(0,0,0,.04);z-index:1}
  .leaflet-container{font-family:Georgia,serif;border-radius:6px;background:#dfe3da}
  .legend{display:flex;flex-wrap:wrap;gap:16px 22px;margin-top:22px}
  .legend > span{display:inline-flex;align-items:center;gap:8px;font-size:.88rem}
  .legend i{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.3);flex:none}
  .map-note{margin-top:12px;font-size:.85rem;font-style:italic;opacity:.75}
  .mk-pop b{color:var(--rust-dk);font-size:1.02rem}
  .mk-pop a{display:inline-block;margin-top:5px;color:var(--rust-dk);font-size:.82rem;text-decoration:none;border-bottom:1px dotted var(--rust)}
  @media(max-width:640px){.map-box{height:64vh}}

  /* ---------- FOOTER ---------- */
  footer{background:var(--ink);color:var(--paper);padding:56px 0;text-align:center}
  footer h3{font-size:1.6rem;font-weight:normal;margin-bottom:10px}
  footer p{opacity:.7;font-size:.9rem;max-width:560px;margin:6px auto 0}
  footer .gold{color:var(--gold)}
  footer a{color:#ffd58a;text-decoration:none}
  footer .version{margin-top:22px;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;opacity:.45}

  /* reveal animation */
  .reveal{opacity:0;transform:translateY(24px);transition:.7s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  @media(max-width:640px){
    nav .brand{width:100%;margin-bottom:6px}
    .lang{margin-left:auto}
    section{padding:56px 0}
  }
</style>
</head>

let LANG = localStorage.getItem('lang') || 'en';
function t(v){ return (v && typeof v === 'object' && !Array.isArray(v)) ? (v[LANG] ?? v.en) : v; }
function mapsLink(e){
  const base = (e.map === true ? (e.title.en || t(e.title)) : e.map);
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(base + " Budapest");
}

function renderContent(){
  for(const [kulcs, elemek] of Object.entries(TARTALOM)){
    const grid = document.getElementById('grid-'+kulcs);
    if(!grid) continue;
    grid.innerHTML = elemek.map(e=>`
      <article class="card reveal">
        ${e.img ? `<img class="photo" loading="lazy" alt="${t(e.title)||''}" src="${e.img}" onerror="this.style.display='none'">`:''}
        <div class="body">
          ${e.tag ? `<span class="tag">${t(e.tag)}</span><br>`:''}
          <h3>${t(e.title)||''}</h3>
          <p>${t(e.text)||''}</p>
          ${e.info ? `<div class="info">› ${t(e.info)}</div>`:''}
          ${(e.map || e.link) ? `<div class="links">
            ${e.map ? `<a href="${mapsLink(e)}" target="_blank" rel="noopener">📍 Map</a>`:''}
            ${e.link ? `<a href="${e.link}" target="_blank" rel="noopener">↗ Website</a>`:''}
          </div>`:''}
        </div>
      </article>`).join('');
  }
  const days = document.getElementById('grid-days');
  if(days){
    days.innerHTML = NAPOK.map(d=>`
      <div class="day reveal">
        <h3>${t(d.title)}</h3>
        <div class="sub">${t(d.sub)}</div>
        <ul>${t(d.items).map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>`).join('');
  }
  const io = new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target);} });
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

function applyChrome(){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.innerHTML = el.getAttribute('data-'+LANG) ?? el.getAttribute('data-en');
  });
  document.documentElement.lang = LANG;
}

function renderVersion(){
  const el = document.getElementById('version');
  if(!el) return;
  const upd = LANG === 'sv' ? 'uppdaterad' : 'updated';
  el.textContent = `v${VERSION} · ${upd} ${UPDATED}`;
}

function setLang(l){
  LANG = l;
  localStorage.setItem('lang', l);
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('active', b.dataset.l === l));
  applyChrome();
  renderVersion();
  renderContent();
}

document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.l)));
setLang(LANG);

(function initMap(){
  if(typeof L === 'undefined' || !document.getElementById('bpmap')) return;
  const map = L.map('bpmap', {scrollWheelZoom:false}).setView([47.4979, 19.0402], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19, attribution:'&copy; OpenStreetMap contributors'
  }).addTo(map);
  const bounds = [];
  MAPPOINTS.forEach(p=>{
    const m = L.circleMarker([p.lat,p.lng],
      {radius:9, color:'#fff', weight:2, fillColor:p.cat, fillOpacity:1}).addTo(map);
    const q = encodeURIComponent(p.name.replace(/ \(.*\)/,'') + " Budapest");
    m.bindPopup(`<div class="mk-pop"><b>${p.name}</b><br>`+
      `<a href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">↗ Directions</a></div>`);
    m.bindTooltip(p.name);
    bounds.push([p.lat,p.lng]);
  });
  map.fitBounds(bounds, {padding:[40,40]});
})();
